name: Daily Market Analysis

on:
  schedule:
    # UTC 时间 12:00 = 北京时间 20:00
    # 周一到周五运行
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Create config file
        run: |
          cat > config.yaml << EOF
          llm:
            provider: zhipu
            model: glm-4-flash
            api_key: "${{ secrets.ZHIPU_API_KEY }}"
            temperature: 0.3
            max_tokens: null
            timeout: 180
            max_retries: 3

          akshare:
            index_code: "000001"
            index_name: "sh000001"
            daily_days: 65
            m15_days: 5
            m5_days: 2
          EOF

      - name: Run analysis
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python daily_task.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: output/
          retention-days: 7